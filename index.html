<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ezstudy 웹 파일 관리자</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f5f6fa; color: #333; }
        h1 { color: #2c3e50; }
        .container { display: flex; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; }
        .token-section { margin-bottom: 20px; padding: 15px; background: #ffeaa7; border-radius: 8px; }
        
        /* 버튼 및 입력창 스타일 */
        input, textarea, select { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0984e3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #74b9ff; }
        button.danger { background: #d63031; }
        button.danger:hover { background: #ff7675; }

        /* 파일 트리 스타일 */
        .item { padding: 8px; margin: 5px 0; background: #f1f2f6; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { cursor: pointer; font-weight: 500; }
        .item-actions button { padding: 3px 8px; font-size: 12px; margin-left: 5px; }
    </style>
</head>
<body>

    <h1>🛠️ ezstudy 저장소 파일 관리자 (Private 전용)</h1>

    <div class="token-section">
        <label>🔑 <strong>GitHub Personal Access Token 입력:</strong></label>
        <input type="password" id="github-token" placeholder="ghp_..." onchange="saveToken()">
        <small style="color: #666;">* 토큰은 본인 브라우저에만 저장되며 외부로 유출되지 않습니다. (repo 권한 필요)</small>
    </div>

    <div class="container">
        <div class="panel">
            <h2>📁 파일 탐색 및 작업</h2>
            <div style="margin-bottom: 15px;">
                <button onclick="loadFiles('')">🔄 목록 새로고침</button>
            </div>
            
            <hr>
            
            <h3>➕ 새 파일/폴더 추가</h3>
            <label>경로 및 파일명 (예: `tongsa/5.html` 입력시 폴더도 자동생성)</label>
            <input type="text" id="new-path" placeholder="예: tongsa/5.html">
            <button onclick="createFile()">파일 생성</button>

            <hr>
            <div id="file-tree">토큰 입력 후 새로고침을 눌러주세요.</div>
        </div>

        <div class="panel">
            <h2>📝 파일 편집/수정</h2>
            <label>선택된 파일 경로</label>
            <input type="text" id="edit-path" readonly>
            <label>내용 (HTML 코드 등)</label>
            <textarea id="edit-content" rows="15" placeholder="파일을 선택하면 내용이 여기에 표시됩니다."></textarea>
            <button onclick="updateFile()">💾 변경사항 저장 (Commit)</button>
        </div>
    </div>

    <script>
        const owner = 'appoung';
        const repo = 'ezstudy';
        let currentFiles = {}; // 파일의 sha 값을 저장하기 위한 공간

        // 로드 시 기존 토큰 불러오기
        document.getElementById('github-token').value = localStorage.getItem('git_token') || '';

        function saveToken() {
            localStorage.setItem('git_token', document.getElementById('github-token').value);
        }

        function getHeaders() {
            const token = localStorage.getItem('git_token');
            return {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };
        }

        // 1. 파일 목록 동적 불러오기 (재귀적으로 폴더 안까지 탐색)
        function loadFiles(path = '') {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            
            fetch(url, { headers: getHeaders() })
            .then(res => {
                if(res.status === 401 || res.status === 403) alert('토큰이 유효하지 않거나 권한이 없습니다.');
                return res.json();
            })
            .then(data => {
                if(!Array.isArray(data)) return;
                
                const treeContainer = document.getElementById('file-tree');
                if(path === '') treeContainer.innerHTML = ''; // 최상위일 때 초기화

                data.forEach(item => {
                    currentFiles[item.path] = item.sha; // SHA 값 저장 (수정/삭제시 필요)

                    if (item.type === 'dir') {
                        // 폴더일 경우 내부 파일 또 가져오기
                        loadFiles(item.path);
                    } else if (item.name.endsWith('.html') || item.name.endsWith('.md') || item.name.endsWith('.json')) {
                        // 파일 렌더링
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `
                            <span class="item-info" onclick="loadFileContent('${item.path}')">📄 ${item.path}</span>
                            <div class="item-actions">
                                <button onclick="renameFile('${item.path}')">이름변경</button>
                                <button class="danger" onclick="deleteFile('${item.path}')">삭제</button>
                            </div>
                        `;
                        treeContainer.appendChild(div);
                    }
                });
            }).catch(err => console.error(err));
        }

        // 2. 파일 내용 가져와서 편집창에 띄우기
        function loadFileContent(path) {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            fetch(url, { headers: getHeaders() })
            .then(res => res.json())
            .then(data => {
                document.getElementById('edit-path').value = path;
                // GitHub API는 파일 내용을 Base64로 인코딩해서 주기 때문에 디코딩 필요
                document.getElementById('edit-content').value = decodeURIComponent(atob(data.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            });
        }

        // 3. 파일 생성 (폴더명/파일명.html 형태로 쓰면 폴더도 같이 생김)
        function createFile() {
            const path = document.getElementById('new-path').value;
            if(!path) return alert('경로를 입력하세요.');

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const body = {
                message: `Create ${path} via Web Manager`,
                content: btoa(unescape(encodeURIComponent("<!DOCTYPE html>\n<html>\n<head><title>새 파일</title></head>\n<body>\n새로운 페이지가 생성되었습니다.\n</body>\n</html>")))
            };

            fetch(url, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(body) })
            .then(res => {
                if(res.ok) { alert('파일이 생성되었습니다!'); loadFiles(); }
                else alert('생성 실패');
            });
        }

        // 4. 파일 수정 (Save)
        function updateFile() {
            const path = document.getElementById('edit-path').value;
            const content = document.getElementById('edit-content').value;
            const sha = currentFiles[path];

            if(!path) return alert('편집할 파일을 먼저 선택하세요.');

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const body = {
                message: `Update ${path} via Web Manager`,
                content: btoa(unescape(encodeURIComponent(content))),
                sha: sha
            };

            fetch(url, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(body) })
            .then(res => {
                if(res.ok) alert('저장(Commit) 완료!');
                else alert('저장 실패');
                loadFiles();
            });
        }

        // 5. 파일 삭제
        function deleteFile(path) {
            if(!confirm(`정말 ${path} 파일을 삭제하시겠습니까?`)) return;l
            const sha = currentFiles[path];
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            
            const body = {
                message: `Delete ${path} via Web Manager`,
                sha: sha
            };

            fetch(url, { method: 'DELETE', headers: getHeaders(), body: JSON.stringify(body) })
            .then(res => {
                if(res.ok) { alert('삭제되었습니다.'); loadFiles(); }
                else alert('삭제 실패');
            });
        }

        // 6. 이름 변경 (실제로는 기존 파일 내용 복사 생성 후 기존 파일 삭제 방식)
        function renameFile(oldPath) {
            const newPath = prompt('새로운 경로와 이름을 입력하세요:', oldPath);
            if(!newPath || oldPath === newPath) return;

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${oldPath}`;
            
            // 기존 내용 가져오기
            fetch(url, { headers: getHeaders() })
            .then(res => res.json())
            .then(data => {
                // 1. 새 이름으로 파일 생성
                const createUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${newPath}`;
                return fetch(createUrl, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ message: `Rename from ${oldPath} to ${newPath}`, content: data.content })
                }).then(res => {
                    // 2. 성공하면 기존 파일 삭제
                    if(res.ok) {
                        return fetch(url, {
                            method: 'DELETE',
                            headers: getHeaders(),
                            body: JSON.stringify({ message: `Remove old file after rename`, sha: data.sha })
                        });
                    }
                });
            })
            .then(() => {
                alert('이름 변경이 완료되었습니다.');
                loadFiles();
            });
        }
    </script>
</body>
</html>
