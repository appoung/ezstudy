<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ezstudy 통합 포털</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --primary-dark: #3b5a84;
            --bg: #f4f6f9;
            --surface: #ffffff;
            --text: #333333;
            --border: #e1e4e8;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 0; margin: 0; background: var(--bg); color: var(--text); }
        
        /* 네비게이션 바 */
        .navbar { display: flex; background: var(--primary-dark); padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-brand { color: white; font-size: 20px; font-weight: bold; display: flex; align-items: center; margin-right: 30px; }
        .nav-tabs { display: flex; list-style: none; padding: 0; margin: 0; }
        .nav-tab { color: #cfd8dc; padding: 20px 25px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .nav-tab:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-tab.active { color: white; background: var(--primary); border-bottom: 4px solid #fff; }

        /* 컨텐츠 영역 */
        .content { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        .card { background: var(--surface); padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        /* 공통 폼 구조 */
        input, textarea { width: 100%; padding: 10px; margin: 8px 0 18px 0; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; padding: 11px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: var(--primary-dark); }
        button.danger { background: #e74c3c; }
        button.danger:hover { background: #c0392b; }

        /* 트리형 목록 구조 (뷰어/관리 공용) */
        .folder-node { font-weight: bold; color: #2980b9; margin: 10px 0; cursor: pointer; list-style: none; }
        .folder-node::before { content: "📁 "; }
        .file-list { margin-left: 20px; padding-left: 10px; border-left: 1px dashed #bdc3c7; }
        .file-node { margin: 8px 0; list-style: none; cursor: pointer; color: #2c3e50; transition: color 0.2s; }
        .file-node:hover { color: #e67e22; }
        .file-node::before { content: "📄 "; }

        /* 프리뷰 창 (뷰어 전용) */
        .preview-container { min-height: 600px; display: flex; flex-direction: column; }
        .preview-header { font-weight: bold; padding: 10px; background: #eef2f7; border-radius: 6px 6px 0 0; border: 1px solid var(--border); }
        .preview-body { flex: 1; border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; background: white; min-height: 550px; }
        iframe { width: 100%; height: 100%; border: none; min-height: 550px; }

        /* 얼럿 메시지 */
        .info-box { background: #e8f4fd; color: #1d6fa5; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">🎓 ezstudy</div>
        <ul class="nav-tabs">
            <li class="nav-tab active" onclick="switchTab('viewer')">🏠 홈 (뷰어)</li>
            <li class="nav-tab" onclick="switchTab('manager')">🛠️ 파일 관리</li>
            <li class="nav-tab" onclick="switchTab('settings')">⚙️ 세팅</li>
        </ul>
    </nav>

    <div class="content">
        
        <div id="tab-viewer" class="tab-panel active">
            <div class="grid">
                <div class="card">
                    <h2>📁 폴더 탐색기</h2>
                    <div id="viewer-tree">목록을 불러오는 중...</div>
                </div>
                <div class="card preview-container">
                    <h2>🖥️ 실시간 파일 뷰어</h2>
                    <div class="preview-header" id="preview-title">선택된 파일이 없습니다.</div>
                    <div class="preview-body" id="preview-body">
                        <p style="text-align:center; color:#95a5a6; padding-top:100px;">좌측 탐색기에서 html이나 pdf 파일을 클릭하면 화면에 즉시 로드됩니다.</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-manager" class="tab-panel">
            <div class="grid">
                <div class="card">
                    <h2>⚙️ 구조 관리 및 편집</h2>
                    <div class="info-box">원하는 파일을 선택하면 우측 편집기에 로드됩니다.</div>
                    <h3>➕ 새 파일 생성</h3>
                    <input type="text" id="new-path" placeholder="예시: tongsa/5.html">
                    <button onclick="createFile()">새 파일 만들기</button>
                    <hr style="margin:20px 0; border:0; border-top:1px solid var(--border);">
                    <div id="manager-tree">목록을 불러오는 중...</div>
                </div>
                <div class="card">
                    <h2>📝 코드/콘텐츠 에디터</h2>
                    <label>현재 파일 경로</label>
                    <input type="text" id="edit-path" readonly style="background:#eee;">
                    <label>파일 본문 내용 (HTML)</label>
                    <textarea id="edit-content" rows="22" style="font-family:Consolas, monospace;"></textarea>
                    <button onclick="updateFile()">💾 변경사항 저장 (Commit)</button>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-panel">
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <h2>⚙️ 시스템 개발 환경 설정</h2>
                <p>Private 저장소 데이터 원격 제어를 위해 GitHub 인증 정보를 등록해 주세요.</p>
                
                <label><strong>GitHub Personal Access Token (Classic)</strong></label>
                <input type="password" id="github-token" placeholder="ghp_로 시작하는 토큰 입력" onchange="saveSettings()">
                
                <label><strong>GitHub 계정 ID (Owner)</strong></label>
                <input type="text" id="github-owner" value="appoung" onchange="saveSettings()">
                
                <label><strong>저장소 이름 (Repository)</strong></label>
                <input type="text" id="github-repo" value="ezstudy" onchange="saveSettings()">
                
                <button onclick="initPortal()" style="width:100%; margin-top:10px;">💾 설정 동기화 및 데이터 동기화</button>
            </div>
        </div>

    </div>

    <script>
        let currentFiles = {};

        // 탭 전환 엔진
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            if(tabName !== 'settings') {
                initPortal();
            }
        }

        // 세팅 데이터 입출력
        if(!localStorage.getItem('git_owner')) localStorage.setItem('git_owner', 'appoung');
        if(!localStorage.getItem('git_repo')) localStorage.setItem('git_repo', 'ezstudy');
        
        document.getElementById('github-token').value = localStorage.getItem('git_token') || '';
        document.getElementById('github-owner').value = localStorage.getItem('git_owner');
        document.getElementById('github-repo').value = localStorage.getItem('git_repo');

        function saveSettings() {
            localStorage.setItem('git_token', document.getElementById('github-token').value.trim());
            localStorage.setItem('git_owner', document.getElementById('github-owner').value.trim());
            localStorage.setItem('git_repo', document.getElementById('github-repo').value.trim());
        }

        function getHeaders() {
            return {
                'Authorization': `token ${localStorage.getItem('git_token')}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };
        }

        // 포털 초기화 및 로드 함수
        function initPortal() {
            const token = localStorage.getItem('git_token');
            if(!token) {
                alert("최초 설정이 필요합니다. [세팅] 탭으로 이동하여 토큰을 먼저 등록해 주세요.");
                return;
            }
            
            document.getElementById('viewer-tree').innerHTML = "불러오는 중...";
            document.getElementById('manager-tree').innerHTML = "불러오는 중...";
            currentFiles = {};
            
            loadDirectoryData('');
        }

        // GitHub API 통합 트리 탐색 함수
        function loadDirectoryData(path = '') {
            const owner = localStorage.getItem('git_owner');
            const repo = localStorage.getItem('git_repo');
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            fetch(url, { headers: getHeaders() })
            .then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                if(!Array.isArray(data)) return;
                
                if(path === '') {
                    document.getElementById('viewer-tree').innerHTML = '';
                    document.getElementById('manager-tree').innerHTML = '';
                }

                // 폴더와 파일 분류 처리용 오브젝트 구조화
                let folders = {};
                let files = [];

                data.forEach(item => {
                    currentFiles[item.path] = item.sha;
                    if(item.type === 'dir') {
                        createFolderContainer(item.path, item.name);
                        loadDirectoryData(item.path); // 하위 탐색 재귀호출
                    } else if(item.name.endsWith('.html') || item.name.endsWith('.pdf') || item.name.endsWith('.md')) {
                        renderFileNode(item.path, item.name);
                    }
                });
            })
            .catch(() => {
                const errStr = "토큰 정보 인증 실패 또는 경로 오류";
                document.getElementById('viewer-tree').innerHTML = errStr;
                document.getElementById('manager-tree').innerHTML = errStr;
            });
        }

        // 폴더 DOM 틀 자동 생성
        function createFolderContainer(folderPath, folderName) {
            ['viewer', 'manager'].forEach(mode => {
                const parent = document.getElementById(`${mode}-tree`);
                if(!document.getElementById(`${mode}-f-${folderPath}`)) {
                    const li = document.createElement('li');
                    li.className = 'folder-node';
                    li.textContent = folderName;
                    
                    const subUl = document.createElement('ul');
                    subUl.className = 'file-list';
                    subUl.id = `${mode}-f-${folderPath}`;
                    
                    parent.appendChild(li);
                    parent.appendChild(subUl);
                }
            });
        }

        // 파일 트리 구성 렌더러
        function renderFileNode(filePath, fileName) {
            const parts = filePath.split('/');
            let parentViewerId = 'viewer-tree';
            let parentManagerId = 'manager-tree';
            
            if(parts.length > 1) {
                const parentPath = parts.slice(0, -1).join('/');
                parentViewerId = `viewer-f-${parentPath}`;
                parentManagerId = `manager-f-${parentPath}`;
            }

            // 1. 홈/뷰어용 노드 추가
            const vParent = document.getElementById(parentViewerId);
            if(vParent) {
                const li = document.createElement('li');
                li.className = 'file-node';
                li.textContent = fileName;
                li.onclick = () => openPreview(filePath, fileName);
                vParent.appendChild(li);
            }

            // 2. 파일관리용 노드 추가
            const mParent = document.getElementById(parentManagerId);
            if(mParent) {
                const li = document.createElement('li');
                li.className = 'file-node';
                li.innerHTML = `
                    <span style="font-weight:500;">${fileName}</span>
                    <span style="float:right;">
                        <button style="padding:2px 7px; font-size:11px;" onclick="loadEditor('${filePath}')">수정</button>
                        <button class="danger" style="padding:2px 7px; font-size:11px;" onclick="deleteFile('${filePath}')">삭제</button>
                    </span>
                `;
                mParent.appendChild(li);
            }
        }

        // [뷰어 액션] 실시간 미리보기 임베드 기능
        function openPreview(path, name) {
            const owner = localStorage.getItem('git_owner');
            const repo = localStorage.getItem('git_repo');
            document.getElementById('preview-title').textContent = `🔍 현재 보기: ${path}`;
            
            const previewBody = document.getElementById('preview-body');
            
            // GitHub Pages 실시간 배포 주소 연결 규칙 적용
            const targetUrl = `https://${owner}.github.io/${repo}/${path}`;
            previewBody.innerHTML = `<iframe src="${targetUrl}"></iframe>`;
        }

        // [관리자 액션] 에디터 소스코드 로드
        function loadEditor(path) {
            const owner = localStorage.getItem('git_owner');
            const repo = localStorage.getItem('git_repo');
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            
            fetch(url, { headers: getHeaders() })
            .then(res => res.json())
            .then(data => {
                document.getElementById('edit-path').value = path;
                if(path.endsWith('.pdf')) {
                    document.getElementById('edit-content').value = "[이진 데이터 바이너리 파일] PDF 파일은 수정 탭에서 원본 소스 수정을 지원하지 않습니다. 필요시 삭제 후 경로에 맞춰 재업로드해 주세요.";
                } else {
                    document.getElementById('edit-content').value = decodeURIComponent(atob(data.content).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                }
            });
        }

        // 파일 생성
        function createFile() {
            const path = document.getElementById('new-path').value.trim();
            const owner = localStorage.getItem('git_owner');
            const repo = localStorage.getItem('git_repo');
            if(!path) return alert('생성할 대상 파일 경로를 명시하세요.');

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const initTemplate = "<!DOCTYPE html>\n<html>\n<head><meta charset='UTF-8'></head>\n<body>\n새 파일 생성 완료\n</body>\n</html>";
            
            const body = {
                message: `Create ${path}`,
                content: btoa(unescape(encodeURIComponent(initTemplate)))
            };

            fetch(url, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(body) })
            .then(res => {
                if(res.ok) { alert('파일이 저장소에 빌드되었습니다.'); initPortal(); }
                else alert('생성 도중 서버 거부 발생');
            });
        }

        // 소스 수정 및 커밋 반영
        function updateFile() {
            const path = document.getElementById('edit-path').value;
            const content = document.getElementById('edit-content').value;
            const owner = localStorage.getItem('git_owner');
            const repo = localStorage.getItem('git_repo');
            const sha = currentFiles[path];

            if(!path) return alert('대상 파일을 먼저 선택하십시오.');
            if(path.endsWith('.pdf')) return alert('PDF 바이너리 파일은 직접 수정할 수 없습니다.');

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const body = {
                message: `Modify ${path}`,
                content: btoa(unescape(encodeURIComponent(content))),
                sha: sha
            };

            fetch(url, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(body) })
            .then(res => {
                if(res.ok) { alert('동기화 커밋 저장 성공!'); initPortal(); }
                else alert('업데이트 실패');
            });
        }

        // 파일 삭제
        function deleteFile(path) {
            if(!confirm(`저장소 내의 [ ${path} ] 파일을 완전히 삭제하시겠습니까?`)) return;
            const owner = localStorage.getItem('git_owner');
            const repo = localStorage.getItem('git_repo');
            const sha = currentFiles[path];
            
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const body = { message: `Remove ${path}`, sha: sha };

            fetch(url, { method: 'DELETE', headers: getHeaders(), body: JSON.stringify(body) })
            .then(res => {
                if(res.ok) { alert('삭제 완료'); initPortal(); }
                else alert('삭제 실패');
            });
        }

        // 최초 기동 실행 정의 
        initPortal();
    </script>
</body>
</html>
